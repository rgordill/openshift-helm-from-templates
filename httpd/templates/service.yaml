apiVersion: v1
kind: Service
metadata:
  name: {{ include "httpd.fullname" . }}
  labels:
    {{- include "httpd.selectorLabels" . | nindent 4 }}
spec:
  ports:
  - name: web
    port: {{ .Values.service.port }}
    targetPort: 8080
  - name: prometheus
    port: 9117
    targetPort: 9117
  selector:
    {{- include "httpd.selectorLabels" . | nindent 4 }}