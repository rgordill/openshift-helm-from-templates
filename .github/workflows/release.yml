name: Release Charts

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Generate chart READMEs for packaging
        run: |
          docker run --rm -v "$PWD:/helm-docs" -w /helm-docs jnorwood/helm-docs:latest --chart-search-root=charts

      - name: Install Helm
        uses: azure/setup-helm@v4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          skip_existing: true
          charts_dir: charts
          config: cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_PAGES_BRANCH: gh-pages

      - name: Trim index and add README to gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          pip install --quiet pyyaml
          python3 << 'PY'
          import yaml
          with open('index.yaml') as f:
            data = yaml.safe_load(f)
          entries = data.get('entries') or {}
          for chart in entries:
            versions = entries[chart]
            if isinstance(versions, list) and len(versions) > 1:
              entries[chart] = [versions[0]]
          with open('index.yaml', 'w') as f:
            yaml.dump(data, f, default_flow_style=False, sort_keys=False, allow_unicode=True)
          PY
          git show origin/main:README.md > README.md
          (echo '---'; echo 'title: OpenShift Helm Charts'; echo '---'; cat README.md) > index.md
          rm -f .nojekyll
          git add index.yaml README.md index.md
          git diff --staged --quiet || git commit -m "chore: index trim and add README for Jekyll (gh-pages)"
          git push origin gh-pages