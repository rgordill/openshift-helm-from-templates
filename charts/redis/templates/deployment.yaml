apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redis.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "redis.selectorLabels" . | nindent 8 }}
    spec:
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      containers:
      - env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              key: database-password
              name: {{ include "redis.fullname" . }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: IfNotPresent
        readinessProbe:
          initialDelaySeconds: 5
          timeoutSeconds: 1
          exec:
            command:
            - "/bin/sh"
            - "-i"
            - "-c"
            - "test \"$(redis-cli -h 127.0.0.1 -a $REDIS_PASSWORD ping)\" == \"PONG\""
        livenessProbe:
          initialDelaySeconds: 30
          timeoutSeconds: 1
          tcpSocket:
            port: 6379
        name: redis
        ports:
        - containerPort: 6379
          protocol: TCP
        resources:
          limits:
            memory: {{ .Values.resources.limits.memory }}
        securityContext:
          privileged: false
        terminationMessagePath: /dev/termination-log
        volumeMounts:
        - mountPath: /var/lib/redis/data
          name: {{ include "redis.fullname" . }}-data
{{- if .Values.monitor }}
      - name: redis-exporter
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: REDIS_ADDR
          value: "redis://$(POD_NAME):6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              key: database-password
              name: {{ include "redis.fullname" . }}
        args: []
        image: "quay.io/oliver006/redis_exporter:latest"
        imagePullPolicy: IfNotPresent
        ports:
          - name: http
            containerPort: 9121
            protocol: TCP
        livenessProbe:
          initialDelaySeconds: 0
          timeoutSeconds: 1
          httpGet:
            path: /
            port: http
        readinessProbe:
          initialDelaySeconds: 0
          timeoutSeconds: 1
          httpGet:
            path: /
            port: http
        resources: {}
{{ end }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      volumes:
      - name: {{ include "redis.fullname" . }}-data
{{- if .Values.storage }}
        persistentVolumeClaim:
          claimName: {{ include "redis.fullname" . }}
{{- else }}
        emptyDir: {}
{{ end }}