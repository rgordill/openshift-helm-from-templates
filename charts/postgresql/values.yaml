# @param {object} image -- Container image configuration
image:
  # @param {string} image.repository -- Image registry and repository
  repository: registry.redhat.io/rhel9/postgresql-15
  # @param {string} [image.tag] -- Image tag
  tag: "latest"

# fullnameOverride: postgresql

# @param {object} storage -- Persistent storage configuration
storage:
  # @param {string} storage.size -- Size of the persistent volume
  size: 1Gi
  # @param {string} storage.storageClass -- StorageClass for the persistent volume
  storageClass: ocs-storagecluster-ceph-rbd

# @param {object} service -- Service configuration
service:
  # @param {number} service.port -- PostgreSQL port
  port: 5432

# @param {object} resources -- Resource limits and requests
resources:
  requests:
    # @param {string} resources.requests.cpu -- CPU request
    cpu: {}
    # @param {string} resources.requests.memory -- Memory request
    memory: {}
  limits:
    # @param {string} resources.limits.cpu -- CPU limit
    cpu: {}
    # @param {string} resources.limits.memory -- Memory limit
    memory: 512Mi

# @param {object} postgresql -- PostgreSQL server configuration
postgresql:
  # @param {string} postgresql.database -- Database name to create
  database: sampledb
  # @param {object} [postgresql.user] -- Custom user credentials (overridden at deploy)
  user: {}
  # @param {object} [postgresql.password] -- Custom password (overridden at deploy)
  password: {}
  # @param {object} [postgresql.adminPassword] -- Admin password (overridden at deploy)
  adminPassword: {}
  # @param {string} postgresql.logDestination -- Log destination (e.g. /dev/stderr)
  logDestination: /dev/stderr

# @param {object} [affinity] -- Pod affinity/anti-affinity rules
affinity: {}

# @param {boolean} monitor -- Enable ServiceMonitor for Prometheus
monitor: true
