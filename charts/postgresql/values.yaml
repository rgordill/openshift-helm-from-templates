# -- Container image configuration
image:
  # -- Image registry and repository
  repository: registry.redhat.io/rhel9/postgresql-15
  # -- Image tag
  tag: "latest"

# fullnameOverride: postgresql

# -- Persistent storage configuration
storage:
  # -- Size of the persistent volume
  size: 1Gi
  # -- StorageClass for the persistent volume
  storageClass: ocs-storagecluster-ceph-rbd

# -- Service configuration
service:
  # -- PostgreSQL port
  port: 5432

# -- Resource limits and requests
resources:
  requests:
    # -- CPU request
    cpu: "0.1"
    # -- Memory request
    memory: 256Mi
  limits:
    # -- CPU limit
    cpu: "0.5"
    # -- Memory limit
    memory: 512Mi

# -- PostgreSQL server configuration
postgresql:
  # -- Database name to create
  database: sampledb
  # -- Custom user credentials (overridden at deploy)
  user: user
  # -- Custom password (overridden at deploy)
  password: password
  # -- Admin password (overridden at deploy)
  adminPassword: adminpassword
  # # -- Log destination (e.g. /dev/stderr)
  # logDestination: /dev/stderr

# -- Pod affinity/anti-affinity rules
affinity: {}

# -- Enable ServiceMonitor for Prometheus
monitor: true
