# -- Container image configuration
image:
  # -- Image registry and repository
  repository: quay.io/freeipa/freeipa-server
  # -- Image tag
  tag: centos-9-stream

# fullnameOverride: ipaserver

# -- Enable OpenShift-specific configuration
openshift: true

# -- Persistent volume configuration
volume:
  # -- Size of the persistent volume (minimum 2Gi for slapd)
  size: 5Gi

# -- Resource limits and requests
resources:
  limits:
    # -- Memory limit
    memory: 512Mi

# -- Service account name for the IPA server pods
serviceAccount: ipa-server

# -- FreeIPA server installation and run options
ipaServer:
  # -- Options passed to ipa-server-install (e.g. -U -r EXAMPLE.TEST --setup-dns)
  installOpts: -U -r EXAMPLE.TEST --setup-dns --no-forwarders --no-ntp
  # -- Command to run in the container
  command: ipa-server-install
  # -- Directory Manager / admin password (at least 8 characters)
  adminPassword: admin2026

# -- Ingress configuration
ingress:
  # -- Enable ingress for the IPA server
  enabled: true
#   annotations:
#     kubernetes.io/ingress.class: nginx
#     kubernetes.io/tls-acme: "true"

  # -- Ingress class name (e.g. openshift-default)
  className: openshift-default
  # -- Hostname for the ingress (should match installOpts domain)
  hostname: ipa-server.example.test
  # -- Use TLS passthrough for LDAP/HTTPS
  passthrough: true
#  tls: not implemented

# -- Pod affinity/anti-affinity rules
affinity: {}
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: kubernetes.io/hostname
  #         operator: In
  #         values:
  #         - node1.example.com
